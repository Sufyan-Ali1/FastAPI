# Lesson 50 - example Nginx reverse-proxy config for a FastAPI app.
#
# Nginx sits in front of the app server (Gunicorn/Uvicorn on :8000), handling
# TLS, static files, buffering, and load balancing. In production this lives at
# /etc/nginx/sites-available/ (or conf.d/) on the server.

# If you run several app servers, list them here and Nginx load-balances:
upstream fastapi_app {
    server 127.0.0.1:8000;
    # server 127.0.0.1:8001;   # add more app servers to spread load
}

server {
    listen 80;
    server_name api.example.com;

    # (In production, terminate TLS here on 443 with your certificate, and
    #  redirect 80 -> 443.)

    location / {
        proxy_pass http://fastapi_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;   # so the app knows HTTP vs HTTPS
    }

    # WebSockets (Lesson 31) require the upgrade headers or the handshake fails.
    location /ws/ {
        proxy_pass http://fastapi_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;                     # keep long-lived sockets open
    }

    # Serve static assets directly from Nginx (far faster than the Python app).
    location /static/ {
        alias /var/www/app/static/;
        expires 30d;
    }
}
